<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NodeBlk</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: "Arial Rounded MT Bold", Arial, sans-serif;
    background:#f5f7fa;
    color:#111;
    scroll-snap-type: y mandatory;
}

section {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    scroll-snap-align:start;
    padding:40px;
}

/* Updated color theme based on logo */
:root {
    --green:#22c55e;
    --blue:#0ea5e9;
    --dark:#0f172a;
}

/* Hero */
.hero {
    background: linear-gradient(135deg, var(--green), var(--blue));
    color:white;
    flex-direction:column;
    text-align:center;
}

.hero h1 {
    font-family:'Orbitron', sans-serif;
    font-size:4rem;
}

/* Section styling */
.panel {
    background:white;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
    padding:40px;
    max-width:900px;
}

h2 {
    font-family:'Orbitron', sans-serif;
    color:var(--dark);
}

.button {
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:white;
    padding:12px 20px;
    border-radius:999px;
    text-decoration:none;
    display:inline-block;
    margin-top:20px;
}

/* Video */
video {
    width:100%;
    border-radius:16px;
}
</style>
</head>

<body>

<section class="hero">
    <h1>NodeBlk</h1>
    <p>Off-grid tech for the future.</p>
</section>

<section>
    <div class="panel">
        <h2>Powered by Pi Zero 2 W</h2>
        <p>Portable computing with battery-powered independence.</p>
    </div>
</section>

<section>
    <div class="panel">
        <h2>Real World Guidance</h2>
        <img src="real-world-guidance-placeholder.svg" style="width:100%;object-fit:contain;">
    </div>
</section>

<section>
    <div class="panel">
        <h2>Offline First System</h2>
        <img src="offline-first-system-placeholder.svg" style="width:100%;object-fit:contain;">
    </div>
</section>

<section>
    <div class="panel">
        <h2>Watch the Commercial</h2>
        <video controls>
            <source src="nodeblk-commercial.mp4" type="video/mp4">
        </video>
    </div>
</section>

<section>
    <div class="panel">
        <h2>Explore NodeBlk</h2>
        <a href="https://odotofrva.github.io/nodeblk/" class="button">Visit Site</a>
    </div>
</section>

</body>
</html>
